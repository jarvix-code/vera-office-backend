# VERA Office - Default Konfiguration
# Diese Werte können via Umgebungsvariablen überschrieben werden

# FastAPI Server
app_name: "VERA Office"
app_version: "1.0.0-alpha"
debug: false  # Auf false in Produktion setzen
host: "0.0.0.0"
port: 8081

# Datenbank
database_url: "sqlite:///data/vera.db"

# OCR Einstellungen
ocr_language: "de"  # Deutsch
ocr_gpu: false  # CPU-only (für Mini-PC)

# Bildverarbeitung
image_max_size: 2048  # Pixel (längste Seite)
image_dpi: 300  # DPI für PDF-Generierung
image_quality: 85  # JPEG-Qualität (0-100)

# Hotfolder
hotfolder_enabled: true
hotfolder_poll_interval: 2  # Sekunden

# Klassifikation (Legacy - siehe ai.confidence_threshold)
classification_threshold: 0.8  # Konfidenz-Schwelle für automatische Ablage

# KI / LLM
ai:
  # Text-LLM (Mistral 7B) für Klassifizierung, Benennung, Filing
  model_path: "models/mistral-7b-instruct-v0.2.Q4_K_M.gguf"
  n_ctx: 4096  # Context window
  n_threads: 8  # CPU threads (Ryzen 9 PRO 8945HS hat 8 Kerne)
  temperature: 0.1  # Low temperature for consistent classification
  confidence_threshold: 0.80  # Minimum confidence for auto-classification
  auto_confirm_threshold: 0.95  # Auto-confirm and add to feedback store
  few_shot_examples: 5  # Number of similar examples to include in prompt
  
  # Vision-LLM für Bild-Qualitätsprüfung
  vision:
    enabled: true
    model_path: "models/ggml-model-q4_k.gguf"
    clip_model_path: "models/mmproj-model-f16.gguf"
    n_ctx: 2048
    n_threads: 8
    temperature: 0.1

# Fast LLM (Cloud) - User-facing Tasks (Chat, Onboarding)
# Falls nicht konfiguriert: Nutzt Local LLM für alles
fast_llm:
  provider: "openai"  # "openai" oder "anthropic" (später)
  model: "gpt-4o-mini"  # Oder "claude-3-haiku-20240307"
  api_key: ""  # Setzen via OPENAI_API_KEY ENV oder hier eintragen
  # api_key: "sk-proj-..."  # NICHT committen!
  
  # Task Routing (welche Tasks nutzen Fast LLM)
  # Andere Tasks nutzen automatisch Local LLM
  tasks:
    - "chat"
    - "onboarding"
    - "user_query"
    - "quick_answer"
    - "search_query"

# Aufbewahrungsfristen (Standard-Werte)
retention_defaults:
  rechnungen: 10  # Jahre
  vertraege: null  # Unbegrenzt
  personal: null
  behoerde: 10

# Logging
log_level: "DEBUG"  # DEBUG, INFO, WARNING, ERROR
log_format: "detailed"  # simple, detailed, json

# Netzwerk (wird aus Onboarding überschrieben)
internet_enabled: false
email_enabled: false

# Update & Telemetrie
# Entwicklermodus: GitHub Releases
# Produktion: Eigener Update-Server
update:
  mode: "github"  # "github" oder "server"
  github_repo_owner: "boris-reimers"  # GitHub Username
  github_repo_name: "vera-office"  # Repository Name
  server_url: "https://updates.vera-office.de"  # Für mode="server"
  auto_update: false  # Automatische Installation (Vorsicht!)
  check_interval_hours: 24  # Prüfe alle 24h auf Updates

# Device Identity (wird bei Installation generiert)
device_id: ""  # UUID - Eindeutige Geräte-ID
license_key: ""  # VERA-Lizenzschlüssel (Format: VERA-XXX-XXX-XXX)

# Telemetrie (DSGVO-konform, nur Metriken)
telemetry:
  enabled: true
  heartbeat_interval_minutes: 30
  batch_size: 50
  offline_buffer_max: 1000

# Auto-Diagnostics
diagnostics:
  enabled: true
  check_interval_seconds: 60
  ocr_fail_threshold: 3
  confidence_warning_threshold: 0.5
  disk_warning_percent: 90

# Telegram Bot (Feedback-Kanal + Dokumenten-Eingang)
telegram:
  bot_token: "8609626407:AAGCACLayiXyQmL07YPtt7J_-QXuLCz6opo"
  chat_id: "7519975748"  # Wird automatisch gesetzt beim ersten Bot-Kontakt
  enabled: true

