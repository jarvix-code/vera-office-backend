    - Praktische Übungen
  action_items:
    - Übungstermine planen
    - Dokumentation der Übungen

# Arbeitssicherheit - Kapitel 6: Brandschutz
as-6-q1:
  pdf: bundle.pdf
  section: "Brandschutz - Feuerlöscher"
  page: 30
  blzk_code: B05
  keywords: [Feuerlöscher, Wartung, vorhanden]
  requirements:
    - Mindestens 1 Feuerlöscher pro 50m² Nutzfläche
    - ABC-Pulverlöscher oder CO2-Löscher
    - Prüfung alle 2 Jahre durch Sachkundigen
    - Montagehöhe 80-120 cm
  action_items:
    - Anzahl und Standorte prüfen
    - Wartungsvertrag abschließen
    - Prüfplaketten kontrollieren

as-6-q2:
  pdf: bundle.pdf
  section: "Brandschutz - Flucht- und Rettungswege"
  page: 31
  blzk_code: B05
  keywords: [Fluchtweg, Rettungsweg, gekennzeichnet, frei]
  requirements:
    - Mindestbreite 80 cm (bis 5 Personen)
    - Türen in Fluchtrichtung
    - Keine Hindernisse
    - Beleuchtete Rettungszeichen
  action_items:
    - Fluchtwege kennzeichnen
    - Hindernisse entfernen
    - Notbeleuchtung prüfen

as-6-q3:
  pdf: bundle.pdf
  section: "Brandschutz - Konzept"
  page: 32
  blzk_code: B05
  keywords: [Brandschutzordnung, Alarmplan, Konzept]
  requirements:
    - Brandschutzordnung Teil A (Aushang)
    - Teil B für Mitarbeiter
    - Alarmplan mit Notrufnummern
    - Sammelplatz festlegen
  action_items:
    - Brandschutzordnung erstellen
    - Aushang im Eingangsbereich
    - Mitarbeiter informieren

as-6-q4:
  pdf: bundle.pdf
  section: "Brandschutz - Übungen"
  page: 32
  blzk_code: B05
  keywords: [Brandschutzübung, Räumungsübung]
  requirements:
    - "Empfohlen: 1x jährlich Räumungsübung"
    - Dokumentation der Übung
    - Auswertung
  action_items:
    - Übungstermin festlegen
    - Ablauf planen
    - Nach Übung evaluieren

