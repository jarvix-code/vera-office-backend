# Arbeitssicherheit - Kapitel 5: Erste Hilfe
as-5-q1:
  pdf: bundle.pdf
  section: "Erste Hilfe - Ersthelfer"
  page: 25
  blzk_code: B07
  keywords: [Ersthelfer, Ausbildung, benannt]
